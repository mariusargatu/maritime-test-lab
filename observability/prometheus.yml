# Prometheus for the demo (obs profile). It loads the estimate-pipeline alert
# rules (the same files promtool tests in make lint) and scrapes the voyage
# /metrics endpoint, so the monitor is live in Grafana. No test gate depends on
# this — the perf gate computes lag via kadm.Lag (D-032).
global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: voyage
    static_configs:
      - targets: ["voyage:9100"]
