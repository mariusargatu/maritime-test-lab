# Minimal OpenTelemetry Collector (obs profile, demo only): receive OTLP from the
# services and forward to Tempo. The services are instrumented (OTel SDK +
# franz-go kotel, D-047); traces flow when OTEL_ENDPOINT points at this collector.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp/tempo]
