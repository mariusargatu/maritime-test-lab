# Routes every estimate-pipeline alert to the webhook log sink (the Slack
# stand-in, D-035). Demo only.
route:
  receiver: webhook-sink
  group_wait: 5s
  group_interval: 10s
  repeat_interval: 1m

receivers:
  - name: webhook-sink
    webhook_configs:
      - url: http://webhook-sink:8080/alerts
        send_resolved: true
